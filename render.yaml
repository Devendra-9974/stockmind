services:
  - type: web
    name: stockmind-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install --upgrade pip && pip install --only-binary=:all: numpy==1.24.4 pandas==2.0.3 && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000
      - key: PYTHON_VERSION
        value: 3.11.9
    plan: free