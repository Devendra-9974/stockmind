services:
  - type: web
    name: stockmind-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install --upgrade pip && pip install --only-binary=:all: numpy==1.24.4 pandas==2.0.3 scikit-learn==1.3.2 matplotlib==3.7.5 && pip install uvicorn[standard]==0.23.2 fastapi==0.100.1 pydantic==1.10.13 python-multipart==0.0.6 aiofiles==23.1.0 httpx==0.24.1 python-dotenv==1.0.0 yfinance==0.2.40 curl_cffi==0.6.2"
    startCommand: "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000
      - key: PYTHON_VERSION
        value: 3.11.9
    plan: free